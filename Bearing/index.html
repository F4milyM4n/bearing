<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Bearing</title>

<!-- PWA / "Add to Home Screen" behavior -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#131515">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bearing">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-32.png">

<!-- Tailwind (layout/spacing/typography utilities only — all color comes
     from Bearing's own theme system, not Tailwind's color palette) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React (UMD builds) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
  html, body { background: #131515; margin: 0; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root">
  <noscript>Bearing requires JavaScript to run.</noscript>
</div>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
